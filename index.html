async function abrir(senha){
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey('raw', enc.encode(senha), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:dec(P.salt), iterations:P.iter, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv:dec(P.iv)}, key, dec(P.ct));
  return new TextDecoder().decode(buf);
}

  const err = document.getElementById('err'); err.textContent='';
  try{
    const html = await abrir(document.getElementById('pw').value);
    document.open(); document.write(html); document.close();
  }catch(_){ err.textContent = 'Senha incorreta.'; }
});
